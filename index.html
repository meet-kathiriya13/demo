<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="login-card" aria-labelledby="login-heading">
        <h1 id="login-heading">Welcome back</h1>
        <p class="subtitle">Sign in with your email and password</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <p class="error-message" id="emailError" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <p class="hint">At least 8 characters, including one number.</p>
            <p class="error-message" id="passwordError" aria-live="polite"></p>
          </div>

          <button type="submit" class="btn-login">Log in</button>
          <p class="success-message" id="successMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
